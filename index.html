<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoGames - Calendrier des Sorties du Jeu Vidéo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Chrono<span>Games</span></h1>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Rechercher un jeu (ex: Baldur's Gate, Kenshi...)">
                <button id="search-btn">Rechercher</button>
            </div>
        </div>
    </header>

    <main>
        <!-- Filtres de navigation (Trimestres et Plateformes) -->
<section class="controls-section">
            <div class="filters-row-top">
                <div class="filter-group">
                    <h3>Période</h3>
                    <div class="btn-grid" id="quarter-filters">
                        <button class="filter-btn active" data-quarter="all">Toute l'année</button>
                        <button class="filter-btn" data-quarter="Q1">T1 (Jan - Mar)</button>
                        <button class="filter-btn" data-quarter="Q2">T2 (Avr - Juin)</button>
                        <button class="filter-btn" data-quarter="Q3">T3 (Juil - Sept)</button>
                        <button class="filter-btn" data-quarter="Q4">T4 (Oct - Déc)</button>
                        <button class="filter-btn" data-quarter="anticipated" style="border-color: var(--accent-blue);">🔥 Les plus attendus</button>
                    </div>
                    <div>
                        <h3>Année</h3>
                        <select id="year-select" class="sort-dropdown">
                            <option value="2027">2027</option>
                            <option value="2026" selected>2026</option>
                            <option value="2025">2025</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                            <option value="2022">2022</option>
                        </select>
                    </div>
                </div>
                

                <div class="filter-group dropdowns-grid">
                    <div>
                        <h3>Genre (Mécaniques)</h3>
                        <select id="genre-select" class="sort-dropdown">
                            <option value="all">Tous les genres</option>
                            <option value="33">Arcade</option>
                            <option value="31">Aventure</option>
                            <option value="35">Cartes et Plateau</option>
                            <option value="4">Combat</option>
                            <option value="10">Course</option>
                            <option value="30">Flipper</option>
                            <option value="25">Hack and slash / Beat 'em up</option>
                            <option value="32">Indépendant</option>
                            <option value="36">MOBA</option>
                            <option value="7">Musique</option>
                            <option value="8">Plateforme</option>
                            <option value="2">Point-and-click</option>
                            <option value="26">Quiz / Trivia</option>
                            <option value="12">RPG (Jeu de rôle)</option>
                            <option value="11">RTS (Stratégie temps réel)</option>
                            <option value="9">Réflexion / Puzzle</option>
                            <option value="5">Shooter (FPS/TPS)</option>
                            <option value="13">Simulateur / Gestion</option>
                            <option value="14">Sport</option>
                            <option value="15">Stratégie</option>
                            <option value="16">Stratégie au tour par tour</option>
                            <option value="24">Tactique</option>
                            <option value="34">Visual Novel</option>
                        </select>
                    </div>

                    <div>
                        <h3>Univers / Thème</h3>
                        <select id="theme-select" class="sort-dropdown">
                            <option value="all">Tous les univers</option>
                            <option value="31">Drame</option>
                            <option value="17">Fantasy</option>
                            <option value="39">Guerre</option>
                            <option value="22">Historique</option>
                            <option value="19">Horreur</option>
                            <option value="38">Monde ouvert (Open World)</option>
                            <option value="43">Mystère</option>
                            <option value="32">Non-fiction</option>
                            <option value="33">Sandbox</option>
                            <option value="18">Science-Fiction</option>
                            <option value="21">Survie (Survival)</option>
                            <option value="20">Thriller</option>
                        </select>
                    </div>

                    <div>
                        <h3>Trier par</h3>
                        <select id="sort-select" class="sort-dropdown">
                            <option value="date_asc">Date (Plus ancien)</option>
                            <option value="date_desc">Date (Plus récent)</option>
                            <option value="popular">Popularité</option>
                            <option value="rating_desc">Mieux notés</option>
                            <option value="rating_asc">Moins bien notés</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="filter-group">
                <h3>Plateformes</h3>
                <div class="btn-grid" id="platform-filters">
                    <button class="filter-btn active" data-platform="all">Toutes</button>
                    <button class="filter-btn" data-platform="6">PC</button>
                    <button class="filter-btn" data-platform="167">PS5</button>
                    <button class="filter-btn" data-platform="169">Xbox Series X|S</button>
                    <button class="filter-btn" data-platform="130">Nintendo Switch</button>
                </div>
            </div>
        </section>

        <!-- Grille d'affichage des jeux -->
        <section class="games-section">
            <h2 id="section-title">Toutes les sorties de l'année</h2>
            <div class="loading-spinner" id="loading" style="display: none;">Chargement des données depuis IGDB...</div>
            <div class="error-message" id="error-display" style="display: none;"></div>
            <div class="games-grid" id="games-container"></div>
            <div style="text-align: center; margin-top: 2.5rem;">
                <button id="load-more-btn" class="filter-btn active" style="display: none; padding: 0.75rem 2rem; font-size: 1.1rem;">
                    Charger plus de jeux
                </button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ChronoGames - Propulsé par l'API IGDB de Twitch</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
