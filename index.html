<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoGames - Calendrier des Sorties du Jeu Vidéo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Chrono<span>Games</span></h1>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Rechercher un jeu (ex: Baldur's Gate, Kenshi...)">
                <button id="search-btn">Rechercher</button>
            </div>
        </div>
    </header>

    <main>
        <!-- Filtres de navigation (Trimestres et Plateformes) -->
        <section class="controls-section">
            <div class="filter-group">
                <h3>Trimestres</h3>
                <div class="btn-grid" id="quarter-filters">
                    <button class="filter-btn active" data-quarter="all">Tout l'année</button>
                    <button class="filter-btn" data-quarter="Q1">T1 (Jan - Mar)</button>
                    <button class="filter-btn" data-quarter="Q2">T2 (Avr - Juin)</button>
                    <button class="filter-btn" data-quarter="Q3">T3 (Juil - Sept)</button>
                    <button class="filter-btn" data-quarter="Q4">T4 (Oct - Déc)</button>
                </div>
            </div>

            <div class="filter-group">
                <h3>Plateformes</h3>
                <div class="btn-grid" id="platform-filters">
                    <button class="filter-btn active" data-platform="all">Toutes</button>
                    <button class="filter-btn" data-platform="6">PC</button>
                    <button class="filter-btn" data-platform="167">PS5</button>
                    <button class="filter-btn" data-platform="169">Xbox Series X|S</button>
                    <button class="filter-btn" data-platform="130">Nintendo Switch</button>
                </div>
            </div>
        </section>

        <!-- Grille d'affichage des jeux -->
        <section class="games-section">
            <h2 id="section-title">Toutes les sorties de l'année</h2>
            <div class="loading-spinner" id="loading" style="display: none;">Chargement des données depuis IGDB...</div>
            <div class="error-message" id="error-display" style="display: none;"></div>
            <div class="games-grid" id="games-container"></div>
            <div style="text-align: center; margin-top: 2.5rem;">
                <button id="load-more-btn" class="filter-btn active" style="display: none; padding: 0.75rem 2rem; font-size: 1.1rem;">
                    Charger plus de jeux
                </button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ChronoGames - Propulsé par l'API IGDB de Twitch</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
